# U12 deploy workflow — Azure Container Apps + Static Web Apps + ACS.
#
# Triggered on push to main (after the existing CI workflow passes via
# the merge protection rule) and manually via workflow_dispatch.
#
# Components:
#   - apps/api  → Azure Container App (jp-adopt-api)
#   - apps/worker → Azure Container App (jp-adopt-worker, no ingress)
#   - apps/web  → Azure Static Web Apps (Standard plan, BYO ACA backend)
#
# Secrets: pulled from 1Password via the v4 action with the workflow-
# wide OP_ACCOUNT set to ``joshuaproject`` (per the institutional
# learning from the dt-adoption-platform OIDC regression). Each
# secret has a fail-fast guard step that exits before any Azure
# write if the value is empty or missing.
#
# OIDC: federated identity on the GitHub repo. The Azure AD app
# registration must trust this workflow's run_id pattern. See
# ``docs/runbooks/deploy.md`` for the one-time provisioning steps.
#
# RESOURCE NAMES in this file are PLACEHOLDERS — the operator fills
# them in once the jp-infrastructure Terraform modules have created
# the resource group + container apps. Search for ``REPLACE_ME``.

name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      target:
        description: "Which service to deploy"
        type: choice
        required: true
        default: "all"
        options:
          - all
          - api
          - worker
          - web
          - etl

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write  # OIDC federation with Azure AD

env:
  # Required by 1password/load-secrets-action@v4 to pick the correct
  # service-account token when multiple accounts are configured on the
  # runner. Per the dt-adoption-platform learning, set workflow-wide
  # so every job inherits it.
  OP_ACCOUNT: joshuaproject

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Pre-flight: load secrets and validate every required value is
  # non-empty before any Azure write.
  # ──────────────────────────────────────────────────────────────────────
  preflight:
    name: Preflight (secrets, OIDC, fail-fast)
    runs-on: ubuntu-latest
    outputs:
      should_deploy_api: ${{ steps.scope.outputs.should_deploy_api }}
      should_deploy_worker: ${{ steps.scope.outputs.should_deploy_worker }}
      should_deploy_web: ${{ steps.scope.outputs.should_deploy_web }}
      should_deploy_etl: ${{ steps.scope.outputs.should_deploy_etl }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve deploy scope
        id: scope
        run: |
          target="${{ github.event.inputs.target || 'all' }}"
          if [ "$target" = "all" ] || [ "$target" = "api" ]; then
            echo "should_deploy_api=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy_api=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "$target" = "all" ] || [ "$target" = "worker" ]; then
            echo "should_deploy_worker=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy_worker=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "$target" = "all" ] || [ "$target" = "web" ]; then
            echo "should_deploy_web=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy_web=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "$target" = "all" ] || [ "$target" = "etl" ]; then
            echo "should_deploy_etl=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy_etl=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Load deploy secrets from 1Password
        uses: 1password/load-secrets-action@v4
        # The pinned v4 SHA is recommended in the org's release notes;
        # add `with: sha256` here once 1Password publishes the SHA pin.
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          # Values land in the env block below. Each follows the
          # documented vault layout:
          #   op://JP Adopt Platform/Adopt Core - Production/<kebab-case-key>
          # (matches the actual 1Password item created by the
          #  jp-infrastructure operator bringup runbook §3, Category A).
          AZURE_TENANT_ID: op://JP Adopt Platform/Adopt Core - Production/azure-tenant-id
          AZURE_SUBSCRIPTION_ID: op://JP Adopt Platform/Adopt Core - Production/azure-subscription-id
          AZURE_CLIENT_ID: op://JP Adopt Platform/Adopt Core - Production/azure-client-id
          ACR_LOGIN_SERVER: op://JP Adopt Platform/Adopt Core - Production/acr-login-server
          ACA_RESOURCE_GROUP: op://JP Adopt Platform/Adopt Core - Production/aca-resource-group
          ACA_API_APP_NAME: op://JP Adopt Platform/Adopt Core - Production/aca-api-app-name
          ACA_WORKER_APP_NAME: op://JP Adopt Platform/Adopt Core - Production/aca-worker-app-name
          ACA_WEB_APP_NAME: op://JP Adopt Platform/Adopt Core - Production/aca-web-app-name
          # SWA_* retained as a rollback escape hatch until the web Container
          # App soaks (plan Part D retires the SWA). Not in the required list.
          SWA_APP_NAME: op://JP Adopt Platform/Adopt Core - Production/swa-app-name
          SWA_API_TOKEN: op://JP Adopt Platform/Adopt Core - Production/swa-api-token
        with:
          export-env: true

      - name: Fail-fast guard on required secrets
        run: |
          set -euo pipefail
          required=(
            AZURE_TENANT_ID
            AZURE_SUBSCRIPTION_ID
            AZURE_CLIENT_ID
            ACR_LOGIN_SERVER
            ACA_RESOURCE_GROUP
            ACA_API_APP_NAME
            ACA_WORKER_APP_NAME
            ACA_WEB_APP_NAME
          )
          for var in "${required[@]}"; do
            value="$(eval echo "\${$var:-}")"
            if [ -z "$value" ]; then
              # Field names in 1P are kebab-case; reverse the
              # ENV_VAR_NAME convention back to the vault layout.
              field=$(echo "$var" | tr 'A-Z_' 'a-z-')
              echo "::error::Missing required secret $var (vault path: op://JP Adopt Platform/Adopt Core - Production/${field})"
              exit 1
            fi
          done
          echo "All required secrets present."

  # ──────────────────────────────────────────────────────────────────────
  # Build + push the API container image. Tags the image with the
  # commit SHA so the deploy step can reference it precisely.
  # ──────────────────────────────────────────────────────────────────────
  build-api:
    name: Build & push API image
    needs: preflight
    if: needs.preflight.outputs.should_deploy_api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load deploy secrets from 1Password
        uses: 1password/load-secrets-action@v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          AZURE_TENANT_ID: op://JP Adopt Platform/Adopt Core - Production/azure-tenant-id
          AZURE_SUBSCRIPTION_ID: op://JP Adopt Platform/Adopt Core - Production/azure-subscription-id
          AZURE_CLIENT_ID: op://JP Adopt Platform/Adopt Core - Production/azure-client-id
          ACR_LOGIN_SERVER: op://JP Adopt Platform/Adopt Core - Production/acr-login-server
        with:
          export-env: true

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        run: az acr login --name "${{ env.ACR_LOGIN_SERVER }}"

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/jp-adopt-api:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/jp-adopt-api:latest
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/jp-adopt-api:buildcache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/jp-adopt-api:buildcache,mode=max

  build-worker:
    name: Build & push worker image
    needs: preflight
    if: needs.preflight.outputs.should_deploy_worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load deploy secrets from 1Password
        uses: 1password/load-secrets-action@v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          AZURE_TENANT_ID: op://JP Adopt Platform/Adopt Core - Production/azure-tenant-id
          AZURE_SUBSCRIPTION_ID: op://JP Adopt Platform/Adopt Core - Production/azure-subscription-id
          AZURE_CLIENT_ID: op://JP Adopt Platform/Adopt Core - Production/azure-client-id
          ACR_LOGIN_SERVER: op://JP Adopt Platform/Adopt Core - Production/acr-login-server
        with:
          export-env: true

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        run: az acr login --name "${{ env.ACR_LOGIN_SERVER }}"

      - name: Build & push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/jp-adopt-worker:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/jp-adopt-worker:latest
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/jp-adopt-worker:buildcache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/jp-adopt-worker:buildcache,mode=max

  build-etl:
    name: Build & push ETL image
    needs: preflight
    if: needs.preflight.outputs.should_deploy_etl == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load deploy secrets from 1Password
        uses: 1password/load-secrets-action@v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          AZURE_TENANT_ID: op://JP Adopt Platform/Adopt Core - Production/azure-tenant-id
          AZURE_SUBSCRIPTION_ID: op://JP Adopt Platform/Adopt Core - Production/azure-subscription-id
          AZURE_CLIENT_ID: op://JP Adopt Platform/Adopt Core - Production/azure-client-id
          ACR_LOGIN_SERVER: op://JP Adopt Platform/Adopt Core - Production/acr-login-server
        with:
          export-env: true

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        run: az acr login --name "${{ env.ACR_LOGIN_SERVER }}"

      - name: Build & push ETL image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/etl/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/jp-adopt-etl:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/jp-adopt-etl:latest
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/jp-adopt-etl:buildcache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/jp-adopt-etl:buildcache,mode=max

  # ──────────────────────────────────────────────────────────────────────
  # Build + push the web image. The Next.js app builds `output: standalone`
  # and runs as its own Container App (NOT Static Web Apps — SWA cannot run
  # a standalone Node server). NEXT_PUBLIC_* are baked at build time;
  # NEXT_PUBLIC_API_URL=/api makes the browser call same-origin /api/*,
  # which the Next server rewrites to the internal API (see
  # apps/web/next.config.ts).
  # ──────────────────────────────────────────────────────────────────────
  build-web:
    name: Build & push web image
    needs: preflight
    if: needs.preflight.outputs.should_deploy_web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load deploy secrets from 1Password
        uses: 1password/load-secrets-action@v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          AZURE_TENANT_ID: op://JP Adopt Platform/Adopt Core - Production/azure-tenant-id
          AZURE_SUBSCRIPTION_ID: op://JP Adopt Platform/Adopt Core - Production/azure-subscription-id
          AZURE_CLIENT_ID: op://JP Adopt Platform/Adopt Core - Production/azure-client-id
          ACR_LOGIN_SERVER: op://JP Adopt Platform/Adopt Core - Production/acr-login-server
          ACA_RESOURCE_GROUP: op://JP Adopt Platform/Adopt Core - Production/aca-resource-group
          ACA_API_APP_NAME: op://JP Adopt Platform/Adopt Core - Production/aca-api-app-name
        with:
          export-env: true

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}

      - name: Resolve API internal FQDN for the build-time proxy target
        id: apifqdn
        # Next bakes rewrites() at build time, so the proxy destination must
        # be known here. We bake the INTERNAL FQDN (always — even when API
        # ingress is external_enabled). Cross-app traffic within the same
        # ACA managed environment always resolves the `<app>.internal.<env>`
        # FQDN regardless of the target's external ingress state, and that
        # internal path bypasses any ip_security_restriction blocks on
        # external ingress. Reading `properties.configuration.ingress.fqdn`
        # used to return the external FQDN when external_enabled=true; the
        # web proxy would then go web → external API → blocked by the IP
        # allowlist, breaking the smoke test that runs after deploy.
        # Constructing the FQDN from the env's default domain avoids this
        # entirely and is identical regardless of the API's current ingress
        # state.
        run: |
          set -euo pipefail
          env_id=$(az containerapp show \
            --name "${{ env.ACA_API_APP_NAME }}" \
            --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
            --query properties.environmentId -o tsv)
          env_name="${env_id##*/}"
          env_rg=$(az resource show --ids "$env_id" --query resourceGroup -o tsv)
          env_domain=$(az containerapp env show \
            --name "$env_name" --resource-group "$env_rg" \
            --query properties.defaultDomain -o tsv)
          if [ -z "$env_domain" ]; then
            echo "::error::Could not resolve ACA env default domain (env_name=$env_name)"
            exit 1
          fi
          fqdn="${{ env.ACA_API_APP_NAME }}.internal.${env_domain}"
          echo "Resolved internal proxy target: https://${fqdn}"
          echo "api_proxy_target=https://${fqdn}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        run: az acr login --name "${{ env.ACR_LOGIN_SERVER }}"

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            API_PROXY_TARGET=${{ steps.apifqdn.outputs.api_proxy_target }}
            NEXT_PUBLIC_API_URL=/api
            NEXT_PUBLIC_AZURE_AD_TENANT_ID=761e2c5f-34bd-4872-b86c-3a9f3b29d63a
            NEXT_PUBLIC_AZURE_AD_CLIENT_ID=${{ vars.NEXT_PUBLIC_AZURE_AD_CLIENT_ID }}
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/jp-adopt-web:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/jp-adopt-web:latest
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/jp-adopt-web:buildcache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/jp-adopt-web:buildcache,mode=max

  # ──────────────────────────────────────────────────────────────────────
  # Apply Alembic migrations BEFORE rolling the new image. If migrations
  # fail the deploy aborts and the previous revision keeps serving.
  #
  # Path A (per jp-infrastructure PR #157 U11 §6): the migrator
  # connection string lives in Key Vault as ``db-url-migrator`` on
  # ``jp-adopt-core-kv-prod``. We fetch it via ``az keyvault secret
  # show`` inside this job — NOT from 1Password — because Terraform
  # owns the Postgres credentials and rotates them there. The deploy
  # SP gains ``Key Vault Secrets User`` on the vault via the role
  # assignment in PR #157 U3.
  #
  # The migrator role (``jp_adopt_migrator``) owns DDL. Runtime
  # traffic uses ``db-url-runtime`` (the ``jp_adopt`` role with DML
  # only), injected into the API container via an ACA secret-ref the
  # Terraform sets up — NOT consumed in this workflow.
  # ──────────────────────────────────────────────────────────────────────
  migrate:
    name: Apply Alembic migrations
    needs: [preflight, build-api]
    if: needs.preflight.outputs.should_deploy_api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install API dependencies
        working-directory: apps/api
        run: uv sync --extra dev

      - name: Load Azure identity from 1Password
        uses: 1password/load-secrets-action@v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          AZURE_TENANT_ID: op://JP Adopt Platform/Adopt Core - Production/azure-tenant-id
          AZURE_SUBSCRIPTION_ID: op://JP Adopt Platform/Adopt Core - Production/azure-subscription-id
          AZURE_CLIENT_ID: op://JP Adopt Platform/Adopt Core - Production/azure-client-id
        with:
          export-env: true

      - name: Azure login via OIDC
        # Each GHA job runs on a fresh runner; the login from
        # ``build-api`` does not carry. Re-login here so the
        # ``az keyvault`` call below can authenticate.
        uses: azure/login@v2
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}

      - name: Resolve DATABASE_URL from Key Vault (migrator role)
        run: |
          set -euo pipefail
          db_url=$(az keyvault secret show \
            --vault-name jp-adopt-core-kv-prod \
            --name db-url-migrator \
            --query value -o tsv)
          if [ -z "$db_url" ]; then
            echo "::error::db-url-migrator is empty in jp-adopt-core-kv-prod. Has jp-infrastructure stack U4 applied successfully? See jp-infrastructure runbook §6."
            exit 1
          fi
          # Mask the value in logs before exporting.
          echo "::add-mask::$db_url"
          echo "DATABASE_URL=$db_url" >> "$GITHUB_ENV"

      - name: Run alembic upgrade head
        working-directory: apps/api
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

  # ──────────────────────────────────────────────────────────────────────
  # Roll new revisions on Azure Container Apps. Element-wise
  # ``--set-env-vars`` keeps the existing app settings intact while
  # bumping only DEPLOY_SHA + the image tag (matching the institutional
  # learning about ignore_changes — narrow, not broad).
  # ──────────────────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API to ACA
    needs: [preflight, migrate]
    if: needs.preflight.outputs.should_deploy_api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load deploy secrets from 1Password
        uses: 1password/load-secrets-action@v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          AZURE_TENANT_ID: op://JP Adopt Platform/Adopt Core - Production/azure-tenant-id
          AZURE_SUBSCRIPTION_ID: op://JP Adopt Platform/Adopt Core - Production/azure-subscription-id
          AZURE_CLIENT_ID: op://JP Adopt Platform/Adopt Core - Production/azure-client-id
          ACR_LOGIN_SERVER: op://JP Adopt Platform/Adopt Core - Production/acr-login-server
          ACA_RESOURCE_GROUP: op://JP Adopt Platform/Adopt Core - Production/aca-resource-group
          ACA_API_APP_NAME: op://JP Adopt Platform/Adopt Core - Production/aca-api-app-name
          # U12 cutover: the mirror sync (scripts/sync_fpg.py) pulls people-group
          # reference data from jp-adopt-forms' /api/v1/people-groups/export
          # instead of the JP API. Both vars are required by Settings; the API
          # key is a CONCEALED 1P field that the deploy passes through as a
          # secret-ref on the container app.
          FORMS_EXPORT_URL: op://JP Adopt Platform/Adopt Core - Production/forms-export-url
          FORMS_EXPORT_API_KEY: op://JP Adopt Platform/Adopt Core - Production/forms-export-api-key
        with:
          export-env: true

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}

      - name: Ensure container-app secret for forms-export-api-key
        # Re-applied each deploy so a token rotation in 1P propagates without
        # an out-of-band `az containerapp secret set`. Idempotent.
        run: |
          set -euo pipefail
          az containerapp secret set \
            --name "${{ env.ACA_API_APP_NAME }}" \
            --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
            --secrets "forms-export-api-key=${{ env.FORMS_EXPORT_API_KEY }}" \
            >/dev/null

      - name: Update API container app
        id: rollapi
        run: |
          set -euo pipefail
          # ENTRA_DIRECT_AUDIENCE pins the JWT `aud` the API will accept. For
          # tokens issued via the v2.0 endpoint, Entra puts the resource's
          # *appId GUID* in `aud`, NOT the identifier URI — so this is the
          # API app reg's appId, not "api://jp-adopt-core". See
          # docs/runbooks/multi-idp-b2c.md (v2-token aud quirk) and
          # docs/solutions/azure-entra-auth/. Hardcoded because the SPA and API
          # app reg appIds are stable Terraform outputs in jp-infrastructure
          # (stacks/azure/entra/jp-adopt-core-sso); rotation would happen via
          # a TF change + matching deploy.yml bump in the same PR.
          new_rev=$(az containerapp update \
            --name "${{ env.ACA_API_APP_NAME }}" \
            --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
            --image "${{ env.ACR_LOGIN_SERVER }}/jp-adopt-api:${{ github.sha }}" \
            --set-env-vars \
              "DEPLOY_SHA=${{ github.sha }}" \
              "ENTRA_DIRECT_AUDIENCE=75edd3b3-90c8-4982-a619-d038ebaa50ea" \
              "FORMS_EXPORT_URL=${{ env.FORMS_EXPORT_URL }}" \
              "FORMS_EXPORT_API_KEY=secretref:forms-export-api-key" \
            --query properties.latestRevisionName -o tsv)
          if [ -z "$new_rev" ]; then echo "::error::could not determine new API revision name"; exit 1; fi
          echo "Rolled API → $new_rev"
          echo "revision=$new_rev" >> "$GITHUB_OUTPUT"

      - name: Wait for new API revision to become ready
        # Poll the SPECIFIC new revision by name. The old
        # [?active==true]|[0] query matched the already-Healthy OLD revision
        # during a single-revision roll and exited on poll 1 before the new
        # image was serving. Readiness = provisioningState Provisioned AND
        # runningState Running — probe-independent (healthState is "None"
        # for apps without a configured health probe). 30×10s=300s ceiling:
        # first-deploy revisions take ~150-200s (cold ACR pull + container
        # start + asyncpg pool warmup); steady-state lands in 30-60s.
        env:
          REVISION: ${{ steps.rollapi.outputs.revision }}
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            line=$(az containerapp revision show \
              --name "${{ env.ACA_API_APP_NAME }}" \
              --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
              --revision "$REVISION" \
              --query "[properties.provisioningState, properties.runningState]" -o tsv 2>/dev/null || echo "")
            { read -r prov; read -r running; } <<< "$line"  # az tsv emits newline-separated for [a,b]
            if [ "$prov" = "Provisioned" ] && [ "$running" = "Running" ]; then
              echo "API revision $REVISION ready (Provisioned+Running) after ${i} polls."
              exit 0
            fi
            echo "API revision $REVISION prov=$prov running=$running — retrying in 10s ($i/30)"
            sleep 10
          done
          echo "::error::API revision $REVISION did not reach Provisioned+Running within 300s"
          exit 1
        # NOTE: the end-to-end /api/healthz smoke moved to the `smoke` job
        # below. The API ingress is internal-only, so it can only be
        # reached publicly through the web app's /api proxy — which means
        # the smoke must run after deploy-web, not here.

  deploy-worker:
    name: Deploy worker to ACA
    needs: [preflight, build-worker, migrate]
    if: needs.preflight.outputs.should_deploy_worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load deploy secrets from 1Password
        uses: 1password/load-secrets-action@v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          AZURE_TENANT_ID: op://JP Adopt Platform/Adopt Core - Production/azure-tenant-id
          AZURE_SUBSCRIPTION_ID: op://JP Adopt Platform/Adopt Core - Production/azure-subscription-id
          AZURE_CLIENT_ID: op://JP Adopt Platform/Adopt Core - Production/azure-client-id
          ACR_LOGIN_SERVER: op://JP Adopt Platform/Adopt Core - Production/acr-login-server
          ACA_RESOURCE_GROUP: op://JP Adopt Platform/Adopt Core - Production/aca-resource-group
          ACA_WORKER_APP_NAME: op://JP Adopt Platform/Adopt Core - Production/aca-worker-app-name
        with:
          export-env: true

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}

      - name: Update worker container app
        run: |
          az containerapp update \
            --name "${{ env.ACA_WORKER_APP_NAME }}" \
            --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
            --image "${{ env.ACR_LOGIN_SERVER }}/jp-adopt-worker:${{ github.sha }}" \
            --set-env-vars "DEPLOY_SHA=${{ github.sha }}"

  deploy-etl-job:
    name: Deploy ETL cron job to ACA
    needs: [preflight, build-etl, migrate]
    if: needs.preflight.outputs.should_deploy_etl == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load deploy secrets from 1Password
        uses: 1password/load-secrets-action@v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          AZURE_TENANT_ID: op://JP Adopt Platform/Adopt Core - Production/azure-tenant-id
          AZURE_SUBSCRIPTION_ID: op://JP Adopt Platform/Adopt Core - Production/azure-subscription-id
          AZURE_CLIENT_ID: op://JP Adopt Platform/Adopt Core - Production/azure-client-id
          ACR_LOGIN_SERVER: op://JP Adopt Platform/Adopt Core - Production/acr-login-server
          ACA_RESOURCE_GROUP: op://JP Adopt Platform/Adopt Core - Production/aca-resource-group
          ACA_ENVIRONMENT_NAME: op://JP Adopt Platform/Adopt Core - Production/aca-environment-name
          # Connection URLs for the cron. DT credentials live in the
          # "DT Platform - Production" item, jp-adopt-core's DB URL
          # lives in "Adopt Core - Production".
          DT_MYSQL_HOST: op://JP Adopt Platform/DT Platform - Production/mysql-host
          DT_MYSQL_USERNAME: op://JP Adopt Platform/DT Platform - Production/mysql-app-username
          DT_MYSQL_PASSWORD: op://JP Adopt Platform/DT Platform - Production/mysql-app-password
          DT_MYSQL_DATABASE: op://JP Adopt Platform/DT Platform - Production/mysql-database
          DATABASE_URL: op://JP Adopt Platform/Adopt Core - Production/database-url
        with:
          export-env: true

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}

      - name: Compose DT MySQL URL
        # SQLAlchemy URL that the ETL's pymysql driver accepts. Keep the
        # composition here (not in the container) so the ACA Job env
        # carries a single opaque URL rather than 4 sub-secrets.
        run: |
          set -euo pipefail
          # URL-encode the password to survive special chars.
          PW_ENC=$(python3 -c "import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=''))" "${DT_MYSQL_PASSWORD}")
          DT_MYSQL_URL="mysql+pymysql://${DT_MYSQL_USERNAME}:${PW_ENC}@${DT_MYSQL_HOST}:3306/${DT_MYSQL_DATABASE}?ssl_mode=REQUIRED"
          # Mask the URL in workflow logs (password is part of it).
          echo "::add-mask::${DT_MYSQL_URL}"
          echo "DT_MYSQL_URL=${DT_MYSQL_URL}" >> "$GITHUB_ENV"

      - name: Ensure secrets on the ETL cron job
        run: |
          set -euo pipefail
          JOB_NAME="jp-adopt-etl-cron-production"
          # Idempotent: create-or-update. `az containerapp job create`
          # errors if the job exists; we update afterwards either way.
          if ! az containerapp job show \
                --name "${JOB_NAME}" \
                --resource-group "${ACA_RESOURCE_GROUP}" >/dev/null 2>&1; then
            az containerapp job create \
              --name "${JOB_NAME}" \
              --resource-group "${ACA_RESOURCE_GROUP}" \
              --environment "${ACA_ENVIRONMENT_NAME}" \
              --trigger-type "Schedule" \
              --cron-expression "0 * * * *" \
              --replica-timeout 1800 \
              --replica-retry-limit 1 \
              --replica-completion-count 1 \
              --parallelism 1 \
              --image "${ACR_LOGIN_SERVER}/jp-adopt-etl:${{ github.sha }}" \
              --cpu "0.5" \
              --memory "1Gi" \
              --registry-server "${ACR_LOGIN_SERVER}" \
              --registry-identity "system"
          fi
          # Always (re)apply secrets so a rotation flows through.
          az containerapp job secret set \
            --name "${JOB_NAME}" \
            --resource-group "${ACA_RESOURCE_GROUP}" \
            --secrets \
              "dt-mysql-url=${DT_MYSQL_URL}" \
              "database-url=${DATABASE_URL}" \
            >/dev/null
          # Always (re)apply the image + env-from-secret bindings.
          az containerapp job update \
            --name "${JOB_NAME}" \
            --resource-group "${ACA_RESOURCE_GROUP}" \
            --image "${ACR_LOGIN_SERVER}/jp-adopt-etl:${{ github.sha }}" \
            --replace-env-vars \
              "DEPLOY_SHA=${{ github.sha }}" \
              "DT_MYSQL_URL=secretref:dt-mysql-url" \
              "DATABASE_URL=secretref:database-url" \
            >/dev/null

  deploy-web:
    name: Deploy web to ACA
    needs: [preflight, build-web]
    if: needs.preflight.outputs.should_deploy_web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load deploy secrets from 1Password
        uses: 1password/load-secrets-action@v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          AZURE_TENANT_ID: op://JP Adopt Platform/Adopt Core - Production/azure-tenant-id
          AZURE_SUBSCRIPTION_ID: op://JP Adopt Platform/Adopt Core - Production/azure-subscription-id
          AZURE_CLIENT_ID: op://JP Adopt Platform/Adopt Core - Production/azure-client-id
          ACR_LOGIN_SERVER: op://JP Adopt Platform/Adopt Core - Production/acr-login-server
          ACA_RESOURCE_GROUP: op://JP Adopt Platform/Adopt Core - Production/aca-resource-group
          ACA_WEB_APP_NAME: op://JP Adopt Platform/Adopt Core - Production/aca-web-app-name
        with:
          export-env: true

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}

      - name: Update web container app
        id: rollweb
        # Narrow --set-env-vars: bump only DEPLOY_SHA + the image tag. The
        # /api proxy target is baked into the image at build time (not a
        # runtime env), so nothing else needs setting here.
        run: |
          set -euo pipefail
          new_rev=$(az containerapp update \
            --name "${{ env.ACA_WEB_APP_NAME }}" \
            --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
            --image "${{ env.ACR_LOGIN_SERVER }}/jp-adopt-web:${{ github.sha }}" \
            --set-env-vars "DEPLOY_SHA=${{ github.sha }}" \
            --query properties.latestRevisionName -o tsv)
          if [ -z "$new_rev" ]; then echo "::error::could not determine new web revision name"; exit 1; fi
          echo "Rolled web → $new_rev"
          echo "revision=$new_rev" >> "$GITHUB_OUTPUT"

      - name: Wait for new web revision to become ready
        # Poll the specific new revision (see the API job for why
        # [?active==true]|[0] is unsafe). Readiness = Provisioned + Running.
        env:
          REVISION: ${{ steps.rollweb.outputs.revision }}
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            line=$(az containerapp revision show \
              --name "${{ env.ACA_WEB_APP_NAME }}" \
              --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
              --revision "$REVISION" \
              --query "[properties.provisioningState, properties.runningState]" -o tsv 2>/dev/null || echo "")
            { read -r prov; read -r running; } <<< "$line"  # az tsv emits newline-separated for [a,b]
            if [ "$prov" = "Provisioned" ] && [ "$running" = "Running" ]; then
              echo "Web revision $REVISION ready (Provisioned+Running) after ${i} polls."
              exit 0
            fi
            echo "Web revision $REVISION prov=$prov running=$running — retrying in 10s ($i/30)"
            sleep 10
          done
          echo "::error::Web revision $REVISION did not reach Provisioned+Running within 300s"
          exit 1

  # ──────────────────────────────────────────────────────────────────────
  # End-to-end smoke. Runs whenever api AND/OR web deployed (so a
  # target=api-only deploy is still verified — it was previously left with
  # no post-deploy check). The API ingress is internal-only, so the only
  # public path to it is through the web app's /api proxy
  # (apps/web/next.config.ts rewrites /api/* → internal API FQDN, baked at
  # build). Pre-cutover this targets the ACA-generated web FQDN; the custom
  # domain works too once Part C cuts it over. The /api/healthz check
  # therefore relies on a web app already being deployed — true in steady
  # state; the first bring-up deploys both together (target=all).
  # ──────────────────────────────────────────────────────────────────────
  smoke:
    name: End-to-end smoke (web + API proxy)
    needs: [preflight, deploy-api, deploy-web]
    if: >-
      ${{ !cancelled()
      && needs.preflight.result == 'success'
      && needs.deploy-api.result != 'failure' && needs.deploy-api.result != 'cancelled'
      && needs.deploy-web.result != 'failure' && needs.deploy-web.result != 'cancelled'
      && (needs.preflight.outputs.should_deploy_api == 'true' || needs.preflight.outputs.should_deploy_web == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - name: Load deploy secrets from 1Password
        uses: 1password/load-secrets-action@v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          AZURE_TENANT_ID: op://JP Adopt Platform/Adopt Core - Production/azure-tenant-id
          AZURE_SUBSCRIPTION_ID: op://JP Adopt Platform/Adopt Core - Production/azure-subscription-id
          AZURE_CLIENT_ID: op://JP Adopt Platform/Adopt Core - Production/azure-client-id
          ACA_RESOURCE_GROUP: op://JP Adopt Platform/Adopt Core - Production/aca-resource-group
          ACA_WEB_APP_NAME: op://JP Adopt Platform/Adopt Core - Production/aca-web-app-name
        with:
          export-env: true

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}

      - name: Resolve web FQDN
        id: web
        run: |
          set -euo pipefail
          fqdn=$(az containerapp show \
            --name "${{ env.ACA_WEB_APP_NAME }}" \
            --resource-group "${{ env.ACA_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn -o tsv)
          if [ -z "$fqdn" ]; then
            echo "::error::web app has no ingress FQDN — is ${{ env.ACA_WEB_APP_NAME }} provisioned with external ingress?"
            exit 1
          fi
          echo "fqdn=$fqdn" >> "$GITHUB_OUTPUT"

      - name: Smoke — web root serves the app
        # Only when web was (re)deployed this run. Retry: a freshly-rolled
        # revision may 5xx briefly while ACA shifts traffic.
        if: needs.preflight.outputs.should_deploy_web == 'true'
        env:
          FQDN: ${{ steps.web.outputs.fqdn }}
        run: |
          set -euo pipefail
          for i in $(seq 1 18); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" "https://${FQDN}/" || echo "000")
            if [ "$code" = "200" ]; then echo "web root 200 after ${i} tries"; exit 0; fi
            echo "web root → ${code} (try ${i}/18) — retrying in 10s"
            sleep 10
          done
          echo "::error::web root did not return 200 within ~180s"
          exit 1

      - name: Smoke — /api proxy reaches the API (web deploy)
        # Verifies the NEW web image's /api/* rewrite actually forwards to the
        # internal API. web-root 200 alone proves nothing about the proxy
        # (and can even be served by the previous revision). No SHA assertion
        # here — on a web-only deploy the API SHA is unchanged.
        if: needs.preflight.outputs.should_deploy_web == 'true'
        env:
          FQDN: ${{ steps.web.outputs.fqdn }}
        run: |
          set -euo pipefail
          url="https://${FQDN}/api/healthz"
          for i in $(seq 1 18); do
            response=$(curl -fsS "$url" 2>/dev/null || echo "")
            if echo "$response" | grep -q "\"status\":\"ok\""; then
              echo "/api proxy → API reachable after ${i} tries: ${response}"
              exit 0
            fi
            echo "/api proxy not ready (try ${i}/18): ${response:-<no response>} — retrying in 10s"
            sleep 10
          done
          echo "::error::${url} did not return status:ok through the proxy within ~180s"
          exit 1

      - name: Smoke — /api/healthz proxies to the API and carries the SHA
        # Only when the API was (re)deployed this run. Goes through the web
        # /api proxy (the API is internal-only). Retry while the new
        # revision warms.
        if: needs.preflight.outputs.should_deploy_api == 'true'
        env:
          FQDN: ${{ steps.web.outputs.fqdn }}
        run: |
          set -euo pipefail
          url="https://${FQDN}/api/healthz"
          expected_sha="$(echo "${{ github.sha }}" | cut -c1-10)"
          for i in $(seq 1 18); do
            response=$(curl -fsS "$url" 2>/dev/null || echo "")
            if echo "$response" | grep -q "\"sha\":\"${expected_sha}\""; then
              echo "api /healthz carries ${expected_sha} after ${i} tries: ${response}"
              exit 0
            fi
            echo "api /healthz not ready (try ${i}/18): ${response:-<no response>} — retrying in 10s"
            sleep 10
          done
          echo "::error::${url} did not carry expected sha ${expected_sha} within ~180s"
          exit 1
