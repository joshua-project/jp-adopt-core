services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jp_adopt
      POSTGRES_PASSWORD: jp_adopt
      POSTGRES_DB: jp_adopt
    ports:
      # Host 5434 avoids colliding with local Postgres on 5432/5433 (common on dev machines).
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jp_adopt -d jp_adopt"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
